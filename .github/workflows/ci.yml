name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Swift tests
        run: swift test --disable-sandbox
      - name: Unsigned Release package
        run: UNSIGNED=1 scripts/build_app.sh
